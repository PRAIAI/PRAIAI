<svg width="1000" height="1000" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Hintergrund: Absolutes Schwarz (Technischer Arbeitsraum) -->
  <rect width="100%" height="100%" fill="#000000"/>

  <!-- GRID-LAYOUT: 4 QUADRANTEN -->
  <line x1="500" y1="0" x2="500" y2="1000" stroke="#333" stroke-width="1"/>
  <line x1="0" y1="500" x2="1000" y2="500" stroke="#333" stroke-width="1"/>

  <!-- 1. Total-Schnitt von oben (Konzentrische Ringe) -->
  <g transform="translate(250,250)">
    <circle r="150" stroke="#00FFFF" stroke-width="2" fill="none" opacity="0.5"/>
    <circle r="100" stroke="#FFD700" stroke-width="4" fill="none"/>
    <circle r="50" stroke="#FF0000" stroke-width="4" fill="none"/>
    <text x="-70" y="-170" fill="#FFF" font-size="12">1. Full Section (Arrangement)</text>
  </g>

  <!-- 2. Annihilations-Kern (Mikro-Schnitt) -->
  <g transform="translate(750,250)">
    <path d="M-50 -50 L50 50 M-50 50 L50 -50" stroke="#FFFFFF" stroke-width="3"/>
    <circle r="30" stroke="#FFD700" fill="none" stroke-dasharray="4"/>
    <text x="-70" y="-170" fill="#FFF" font-size="12">2. Micro Section (Annihilation)</text>
  </g>

  <!-- 3. Recycling & Zersetzung (Mechanischer Takt) -->
  <g transform="translate(250,750)">
    <rect x="-80" y="-40" width="160" height="80" stroke="#FF0000" stroke-width="3" fill="none"/>
    <rect x="-20" y="-20" width="40" height="40" fill="#FF0000" opacity="0.4"/>
    <circle cx="120" cy="0" r="40" stroke="#FFFF00" stroke-width="3" fill="none"/>
    <text x="-70" y="-170" fill="#FFF" font-size="12">3. Recycling &amp; Decomposition</text>
  </g>

  <!-- 4. Synthese-Helices (Parallele Ströme) -->
  <g transform="translate(750,750)">
    <path d="M-100 -20 Q-50 -80 0 -20 T100 -20" stroke="#FFD700" stroke-width="3" fill="none"/>
    <path d="M-100 20 Q-50 -40 0 20 T100 20" stroke="#8A2BE2" stroke-width="3" fill="none"/>
    <text x="-70" y="-170" fill="#FFF" font-size="12">4. Synthesis Helices</text>
  </g>

  <!-- PRAIAI-Stempel -->
  <text x="450" y="520" fill="#FFD700" font-family="Arial" font-weight="bold">PRAIAI - A.M.A.E. DIAGRAM</text>
</svg>

